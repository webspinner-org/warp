<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-label="Genesis Spinner"
>
  <defs>
    <radialGradient id="genBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1416" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1" />
    </radialGradient>
    <radialGradient id="genCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="40%" stop-color="#5fcfe0" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#3b8a93" stop-opacity="0.5" />
    </radialGradient>
    <linearGradient id="genRay" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#c9a96a" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#c9a96a" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#genBg)" />

  <!-- Faint outer halo ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#3b8a93" stroke-width="0.8" opacity="0.35" />
  <circle cx="128" cy="128" r="84" fill="none" stroke="#5fcfe0" stroke-width="0.6" opacity="0.4" />

  <!-- 12 radiating rays — first light. Each is a thin gold tapered line. -->
  <g transform="translate(128 128)">
    <g stroke="url(#genRay)" stroke-width="1.6" stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="-110" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(30)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(60)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(90)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(120)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(150)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(180)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(210)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(240)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(270)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(300)" />
      <line x1="0" y1="-30" x2="0" y2="-110" transform="rotate(330)" />
    </g>
    <!-- Shorter inter-rays at 15° offsets, dimmer -->
    <g stroke="#c9a96a" stroke-width="0.8" stroke-linecap="round" opacity="0.4">
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(15)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(45)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(75)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(105)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(135)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(165)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(195)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(225)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(255)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(285)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(315)" />
      <line x1="0" y1="-30" x2="0" y2="-78" transform="rotate(345)" />
    </g>
  </g>

  <!-- Bright core — the first light -->
  <circle cx="128" cy="128" r="28" fill="url(#genCore)" />
  <circle cx="128" cy="128" r="6" fill="#ffffff" opacity="0.95" />
</svg>
