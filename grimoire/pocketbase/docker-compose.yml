# PocketBase stack for the Webspinner Foundation Cell's bootstrap Grimoire.
# Runs on Kepler, bound to localhost only — reached over LAN by the
# co-located Loom; no public hostname during bootstrap.

services:
  pocketbase:
    build:
      context: .
      args:
        PB_VERSION: 0.38.0
    image: webspinner-foundation/grimoire-pocketbase:0.38.0
    container_name: wp-grimoire-pocketbase
    restart: unless-stopped
    ports:
      - '127.0.0.1:8090:8090'
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8090/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pb_data:
    driver: local
